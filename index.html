<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mystery Lane — L'Affaire du Fantôme Vert</title>
<style>
  :root{
    --nuit:#131a3d;
    --nuit2:#1f2857;
    --panneau:#2b3468;
    --panneau2:#39428a;
    --or:#ffc857;
    --or-fonce:#e0a52e;
    --creme:#fff6e3;
    --creme2:#f4e3c2;
    --vert:#7dffb5;
    --vert-fonce:#2fbf72;
    --rouge:#ef6351;
    --brique:#9c4a3c;
    --encre:#2b2340;
    --fur:#e8b478;
    --ombre:0 6px 0 rgba(0,0,0,.28);
    --f-titre:'Chalkboard SE','Comic Sans MS','Segoe Print','Trebuchet MS',cursive;
    --f-texte:'Trebuchet MS','Segoe UI',Verdana,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    background:radial-gradient(ellipse at 50% -20%,#2a3470 0%,var(--nuit) 55%,#0c1129 100%);
    font-family:var(--f-texte);
    color:var(--creme);
    display:flex;align-items:center;justify-content:center;
    overflow:hidden;
  }
  #jeu{
    position:relative;width:min(100vw,178vh);height:min(100vh,56.25vw);
    max-width:1200px;max-height:675px;
    overflow:hidden;border-radius:14px;
    box-shadow:0 20px 60px rgba(0,0,0,.55);
    background:var(--nuit);
  }
  @media (max-width:700px){ #jeu{border-radius:0;max-width:none;max-height:none;width:100vw;height:100dvh} }

  /* ---------- écrans ---------- */
  .ecran{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;animation:apparait .45s ease}
  @keyframes apparait{from{opacity:0;transform:scale(1.015)}to{opacity:1;transform:none}}
  .scene-svg{position:absolute;inset:0;width:100%;height:100%}
  .scene-svg svg{width:100%;height:100%;display:block}

  /* ---------- barre du haut ---------- */
  #barre{
    position:absolute;top:0;left:0;right:0;height:52px;z-index:40;
    display:flex;align-items:center;gap:8px;padding:0 10px;
    background:linear-gradient(180deg,rgba(10,14,36,.92),rgba(10,14,36,.55) 80%,transparent);
    pointer-events:none;
  }
  #barre>*{pointer-events:auto}
  #titre-affaire{
    font-family:var(--f-titre);font-size:15px;color:var(--or);
    text-shadow:0 2px 0 rgba(0,0,0,.5);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    flex:1;
  }
  .b-rond{
    border:none;cursor:pointer;font-family:var(--f-titre);
    background:var(--panneau2);color:var(--creme);
    border-radius:999px;height:38px;padding:0 14px;font-size:14px;
    box-shadow:0 3px 0 rgba(0,0,0,.35);
    display:flex;align-items:center;gap:6px;flex:none;
  }
  .b-rond:active{transform:translateY(2px);box-shadow:0 1px 0 rgba(0,0,0,.35)}
  #b-carnet{background:var(--or);color:var(--encre);font-weight:bold}
  #b-carnet.alerte::after{content:'!';margin-left:2px;background:var(--rouge);color:#fff;border-radius:50%;
    width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;font-size:13px;animation:pulse 1s infinite}
  #compteur{font-size:13px;background:var(--panneau);border-radius:999px;padding:6px 12px;flex:none}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.25)}}

  /* ---------- boutons génériques ---------- */
  .btn{
    border:none;cursor:pointer;font-family:var(--f-titre);
    background:var(--or);color:var(--encre);
    font-size:clamp(16px,2.6vmin,21px);font-weight:bold;
    padding:14px 26px;border-radius:999px;
    box-shadow:var(--ombre);letter-spacing:.3px;
    transition:transform .08s;
  }
  .btn:hover{transform:translateY(-2px)}
  .btn:active{transform:translateY(3px);box-shadow:0 2px 0 rgba(0,0,0,.28)}
  .btn.secondaire{background:var(--panneau2);color:var(--creme)}
  .btn.vert{background:var(--vert-fonce);color:#fff}
  .btn:focus-visible,.b-rond:focus-visible,.choix:focus-visible{outline:3px solid var(--vert);outline-offset:2px}

  /* ---------- dialogues ---------- */
  #dialogue{
    position:absolute;left:0;right:0;bottom:0;z-index:50;
    padding:10px 12px 14px;display:none;
    background:linear-gradient(0deg,rgba(8,11,30,.94) 60%,transparent);
  }
  #dialogue.visible{display:block;animation:monte .3s ease}
  @keyframes monte{from{transform:translateY(30px);opacity:0}to{transform:none;opacity:1}}
  #bulle{
    position:relative;max-width:820px;margin:0 auto;
    background:var(--creme);color:var(--encre);
    border-radius:20px;padding:16px 20px 16px 96px;min-height:92px;
    box-shadow:0 8px 0 rgba(0,0,0,.3);
    cursor:pointer;
  }
  #portrait{
    position:absolute;left:-6px;top:50%;transform:translateY(-50%);
    width:88px;height:88px;border-radius:50%;
    background:var(--panneau2);border:4px solid var(--or);
    overflow:hidden;box-shadow:0 4px 10px rgba(0,0,0,.35);
  }
  #portrait svg{width:100%;height:100%}
  #nom-perso{
    font-family:var(--f-titre);font-size:14px;color:var(--brique);
    font-weight:bold;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px;
  }
  #texte-dialogue{font-size:clamp(16px,2.7vmin,20px);line-height:1.45}
  #suite{
    position:absolute;right:14px;bottom:8px;font-size:20px;color:var(--brique);
    animation:rebond 1s infinite;
  }
  @keyframes rebond{0%,100%{transform:translateY(0)}50%{transform:translateY(4px)}}
  #choix-zone{max-width:820px;margin:10px auto 0;display:flex;flex-direction:column;gap:8px}
  .choix{
    border:none;cursor:pointer;text-align:left;
    background:var(--panneau2);color:var(--creme);
    font-family:var(--f-texte);font-size:clamp(15px,2.5vmin,18px);
    padding:12px 18px;border-radius:14px;
    box-shadow:0 4px 0 rgba(0,0,0,.3);
    transition:transform .08s;
  }
  .choix:hover{transform:translateX(4px);background:#454f9e}
  .choix:active{transform:translateY(2px)}

  /* ---------- hotspots ---------- */
  .hotspot{cursor:pointer}
  .hotspot .halo{
    fill:var(--or);opacity:.0;
    animation:halo 1.8s infinite;
    transform-box:fill-box;transform-origin:center;
  }
  @keyframes halo{0%{opacity:.55;transform:scale(.5)}70%{opacity:0;transform:scale(1.4)}100%{opacity:0}}
  .hotspot .picto{transform-box:fill-box;transform-origin:center;animation:flotte 2.2s ease-in-out infinite}
  @keyframes flotte{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
  .hotspot:hover .picto{filter:brightness(1.25)}
  .hotspot.fait .halo,.hotspot.fait .picto{display:none}
  .etiquette{font-family:var(--f-titre);font-size:17px;fill:var(--creme);paint-order:stroke;stroke:#0c1129;stroke-width:4px;text-anchor:middle;pointer-events:none}

  /* ---------- carte ---------- */
  .lieu-carte{cursor:pointer}
  .lieu-carte:hover .medaillon{filter:brightness(1.2)}
  .lieu-carte.verrou{cursor:default;opacity:.55}
  .lieu-carte .nouveau{transform-box:fill-box;transform-origin:center;animation:pulse 1.2s infinite}

  /* ---------- toast indice ---------- */
  #toast{
    position:absolute;top:60px;left:50%;transform:translateX(-50%) translateY(-20px);
    z-index:60;background:var(--vert-fonce);color:#fff;
    font-family:var(--f-titre);font-size:17px;
    padding:12px 22px;border-radius:999px;box-shadow:0 6px 16px rgba(0,0,0,.4);
    opacity:0;pointer-events:none;transition:all .35s ease;
    display:flex;align-items:center;gap:8px;max-width:90%;
  }
  #toast.visible{opacity:1;transform:translateX(-50%) translateY(0)}

  /* ---------- carnet ---------- */
  #carnet{
    position:absolute;inset:0;z-index:70;display:none;
    background:rgba(8,10,28,.8);
    align-items:center;justify-content:center;padding:16px;
  }
  #carnet.visible{display:flex;animation:apparait .25s ease}
  #carnet-page{
    background:var(--creme);color:var(--encre);
    width:min(860px,100%);height:min(560px,100%);
    border-radius:18px;box-shadow:0 14px 0 rgba(0,0,0,.35);
    display:flex;flex-direction:column;overflow:hidden;
    border:6px solid var(--brique);
  }
  #carnet-tete{
    display:flex;align-items:center;gap:6px;padding:10px 12px;
    background:var(--brique);flex-wrap:wrap;
  }
  #carnet-tete h2{font-family:var(--f-titre);color:var(--creme);font-size:18px;flex:1;min-width:140px}
  .onglet{
    border:none;cursor:pointer;font-family:var(--f-titre);font-size:14px;
    background:rgba(255,246,227,.25);color:var(--creme);
    padding:8px 14px;border-radius:999px;
  }
  .onglet.actif{background:var(--creme);color:var(--brique);font-weight:bold}
  #carnet-corps{flex:1;overflow-y:auto;padding:16px}
  .carte-indice{
    display:flex;gap:12px;align-items:flex-start;
    background:#fff;border:2px solid var(--creme2);
    border-radius:14px;padding:10px 14px;margin-bottom:10px;
    box-shadow:0 3px 0 rgba(0,0,0,.08);
  }
  .carte-indice .ico{font-size:28px;flex:none;width:40px;text-align:center}
  .carte-indice h4{font-family:var(--f-titre);font-size:16px;color:var(--brique)}
  .carte-indice p{font-size:15px;line-height:1.4;margin-top:2px}
  .carte-suspect{
    display:flex;gap:14px;align-items:center;
    background:#fff;border:2px solid var(--creme2);
    border-radius:14px;padding:10px 14px;margin-bottom:10px;
  }
  .carte-suspect .tete{width:64px;height:64px;border-radius:50%;overflow:hidden;background:var(--panneau2);border:3px solid var(--or);flex:none}
  .carte-suspect .tete svg{width:100%;height:100%}
  .carte-suspect.barre{opacity:.75}
  .carte-suspect.barre .tete{border-color:#aaa;filter:grayscale(1)}
  .carte-suspect.barre h4{text-decoration:line-through;color:#888}
  .carte-suspect.coupable{border-color:var(--rouge);background:#fff1ef}
  .statut{font-size:14px;font-weight:bold}
  .statut.ok{color:var(--vert-fonce)} .statut.non{color:#b04a3e} .statut.q{color:#8a7bb8}
  .carte-deduction{
    background:#fff;border:2px solid var(--creme2);border-radius:14px;
    padding:12px 14px;margin-bottom:10px;
  }
  .carte-deduction.faite{border-color:var(--vert-fonce);background:#f0fff5}
  .carte-deduction h4{font-family:var(--f-titre);font-size:16px;color:var(--encre)}
  .carte-deduction p{font-size:15px;margin-top:4px}
  .mini{font-size:13px;color:#8a7f6d;margin-top:4px}
  .b-deduire{
    margin-top:8px;border:none;cursor:pointer;font-family:var(--f-titre);
    background:var(--or);color:var(--encre);font-size:15px;font-weight:bold;
    padding:10px 18px;border-radius:999px;box-shadow:0 3px 0 rgba(0,0,0,.2);
    animation:pulse 1.4s infinite;
  }
  #vide-carnet{text-align:center;padding:40px 20px;color:#9a8e78;font-size:16px}

  /* ---------- modale déduction ---------- */
  #modale{
    position:absolute;inset:0;z-index:80;display:none;
    background:rgba(8,10,28,.85);align-items:center;justify-content:center;padding:16px;
  }
  #modale.visible{display:flex;animation:apparait .25s ease}
  #modale-boite{
    background:var(--nuit2);border:5px solid var(--or);
    border-radius:20px;width:min(700px,100%);max-height:100%;overflow-y:auto;
    padding:22px;box-shadow:0 16px 40px rgba(0,0,0,.5);
  }
  #modale-boite h3{font-family:var(--f-titre);color:var(--or);font-size:clamp(17px,3vmin,22px);margin-bottom:6px;display:flex;gap:8px;align-items:center}
  #modale-question{font-size:clamp(16px,2.8vmin,20px);line-height:1.45;margin:10px 0 16px}
  #modale-options{display:flex;flex-direction:column;gap:10px}
  #modale-retour{margin-top:14px;font-size:15px;line-height:1.45;background:rgba(0,0,0,.25);border-radius:12px;padding:12px;display:none}
  #modale-retour.visible{display:block}
  #modale-retour.bon{border-left:5px solid var(--vert)}
  #modale-retour.mauvais{border-left:5px solid var(--rouge)}
  .indices-appui{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
  .puce-indice{background:var(--panneau2);border-radius:999px;padding:4px 12px;font-size:13px}

  /* ---------- bouton idée flottant ---------- */
  #b-idee{
    position:absolute;bottom:18px;right:16px;z-index:45;display:none;
    border:none;cursor:pointer;font-family:var(--f-titre);font-weight:bold;
    background:var(--vert);color:var(--encre);font-size:17px;
    padding:14px 22px;border-radius:999px;box-shadow:0 6px 0 rgba(0,0,0,.35),0 0 24px rgba(125,255,181,.5);
    animation:pulse 1.3s infinite;
  }
  #b-idee.visible{display:block}

  /* ---------- écran titre / fin ---------- */
  .voile-texte{
    position:relative;z-index:10;text-align:center;padding:20px;max-width:760px;
  }
  h1.titre-jeu{
    font-family:var(--f-titre);font-size:clamp(30px,7vmin,58px);color:var(--or);
    text-shadow:0 4px 0 rgba(0,0,0,.45), 0 0 30px rgba(255,200,87,.35);
    line-height:1.1;
  }
  .sous-titre{
    font-family:var(--f-titre);font-size:clamp(17px,3.4vmin,26px);color:var(--vert);
    text-shadow:0 2px 0 rgba(0,0,0,.5);margin-top:10px;
  }
  .para-intro{font-size:clamp(16px,2.8vmin,20px);line-height:1.55;margin:16px 0;text-shadow:0 2px 4px rgba(0,0,0,.6)}
  .rangee-boutons{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:18px}

  @media (prefers-reduced-motion:reduce){
    *,*::before,*::after{animation-duration:.001s !important;animation-iteration-count:1 !important;transition-duration:.001s !important}
  }
</style>
</head>
<body>
<div id="jeu">
  <div id="barre" style="display:none">
    <div id="titre-affaire">🔍 L'Affaire du Fantôme Vert</div>
    <div id="compteur">🐾 0/12</div>
    <button class="b-rond" id="b-son" title="Son"></button>
    <button class="b-rond" id="b-carte-retour" style="display:none">🗺️ Carte</button>
    <button class="b-rond" id="b-carnet">📓 Carnet</button>
  </div>

  <div id="conteneur-ecran"></div>

  <button id="b-idee">💡 Clever a une idée !</button>

  <div id="dialogue">
    <div id="bulle">
      <div id="portrait"></div>
      <div id="nom-perso"></div>
      <div id="texte-dialogue"></div>
      <div id="suite">▼</div>
    </div>
    <div id="choix-zone"></div>
  </div>

  <div id="toast"></div>

  <div id="carnet">
    <div id="carnet-page">
      <div id="carnet-tete">
        <h2>📓 Le carnet de Clever</h2>
        <button class="onglet actif" data-tab="indices">✨ Indices</button>
        <button class="onglet" data-tab="suspects">🐾 Suspects</button>
        <button class="onglet" data-tab="deductions">💡 Déductions</button>
        <button class="onglet" data-tab="fermer">✖ Fermer</button>
      </div>
      <div id="carnet-corps"></div>
    </div>
  </div>

  <div id="modale">
    <div id="modale-boite">
      <h3>💡 Clever réfléchit...</h3>
      <div id="modale-appui" class="indices-appui"></div>
      <div id="modale-question"></div>
      <div id="modale-options"></div>
      <div id="modale-retour"></div>
    </div>
  </div>
</div>
<script>
/* ============================================================
   MYSTERY LANE — L'Affaire du Fantôme Vert
   Jeu d'enquête autonome (un seul fichier HTML)
   ============================================================ */
"use strict";
const $ = s => document.querySelector(s);

/* ---------- ÉTAT & SAUVEGARDE ---------- */
const ETAT_NEUF = () => ({
  ecran: "titre",
  lieu: null,
  indices: [],
  faits: {},                     // hotspots / étapes accomplies
  deductions: {},                // d1..d5 -> true
  suspects: { rita:"?", hector:"?", zigzag:"?" },
  lieux: { musee:"verrou", ruelle:"verrou", boutique:"verrou", theatre:"verrou" },
  raisons: {},                   // suspect -> raison d'élimination
  son: true,
  fini: false
});
let S = ETAT_NEUF();
const CLE_SAVE = "mysterylane-fantome-vert";
function sauver(){ try{ localStorage.setItem(CLE_SAVE, JSON.stringify(S)); }catch(e){} }
function charger(){ try{ const d = localStorage.getItem(CLE_SAVE); return d ? JSON.parse(d) : null; }catch(e){ return null; } }

/* ---------- AUDIO (petits sons synthétisés, aucune ressource externe) ---------- */
let ctxAudio = null;
function audio(){ if(!ctxAudio){ try{ ctxAudio = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } return ctxAudio; }
function note(freq, t0, duree, type="triangle", vol=0.12){
  const c = audio(); if(!c) return;
  const o = c.createOscillator(), g = c.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(0.0001, c.currentTime + t0);
  g.gain.exponentialRampToValueAtTime(vol, c.currentTime + t0 + 0.02);
  g.gain.exponentialRampToValueAtTime(0.0001, c.currentTime + t0 + duree);
  o.connect(g); g.connect(c.destination);
  o.start(c.currentTime + t0); o.stop(c.currentTime + t0 + duree + 0.05);
}
function son(quoi){
  if(!S.son) return;
  if(quoi==="clic"){ note(520,0,.08,"square",.05); }
  if(quoi==="indice"){ note(660,0,.12); note(880,.1,.18); }
  if(quoi==="bon"){ note(523,0,.12); note(659,.11,.12); note(784,.22,.25); }
  if(quoi==="mauvais"){ note(220,0,.2,"sawtooth",.06); note(180,.15,.25,"sawtooth",.06); }
  if(quoi==="tada"){ [523,659,784,1047].forEach((f,i)=>note(f,i*.12,.3)); note(1319,.5,.6); }
  if(quoi==="mystere"){ note(330,0,.5,"sine",.08); note(392,.2,.5,"sine",.08); note(311,.5,.8,"sine",.08); }
  if(quoi==="pas"){ note(240,0,.06,"square",.04); }
}

/* ---------- PORTRAITS SVG ---------- */
const PORTRAITS = {

<circle cx="30" cy="26" r="13" fill="#e8b478"/><circle cx="30" cy="26" r="7" fill="#f6c9de"/>
<circle cx="70" cy="26" r="13" fill="#e8b478"/><circle cx="70" cy="26" r="7" fill="#f6c9de"/>
<ellipse cx="50" cy="58" rx="34" ry="32" fill="#e8b478"/>
<ellipse cx="50" cy="70" rx="20" ry="15" fill="#fff3dd"/>

<circle cx="38" cy="52" r="6.5" fill="#2b2340"/><circle cx="40" cy="50" r="2" fill="#fff"/>
<circle cx="62" cy="52" r="6.5" fill="#2b2340"/><circle cx="64" cy="50" r="2" fill="#fff"/>
<path d="M29 44 q4 -3 8 -1 M63 43 q4 -2 8 1" stroke="#2b2340" stroke-width="2" fill="none" stroke-linecap="round"/>
<ellipse cx="50" cy="63" rx="4.5" ry="3.5" fill="#d0607a"/>
<path d="M43 72 Q50 78 57 72" stroke="#8a5a3a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
<path d="M50 66 L50 71" stroke="#c99" stroke-width="1.5"/>
<circle cx="82" cy="76" r="11" fill="none" stroke="#ffc857" stroke-width="4"/><line x1="89" y1="85" x2="97" y2="95" stroke="#ffc857" stroke-width="5" stroke-linecap="round"/></svg>`,
bro:`<svg viewBox="0 0 100 100"><rect width="100" height="100" fill="#2fbf72"/>
<circle cx="28" cy="30" r="12" fill="#eda45c"/><circle cx="28" cy="30" r="6" fill="#f6c9de"/>
<circle cx="72" cy="30" r="12" fill="#eda45c"/><circle cx="72" cy="30" r="6" fill="#f6c9de"/>
<ellipse cx="50" cy="60" rx="32" ry="30" fill="#eda45c"/>
<path d="M40 20 Q42 6 50 12 Q52 2 58 10 Q64 4 63 16 Q56 12 50 16 Q44 14 40 20Z" fill="#c97b35"/>
<ellipse cx="50" cy="71" rx="19" ry="14" fill="#fff3dd"/>
<circle cx="38" cy="54" r="6" fill="#2b2340"/><circle cx="40" cy="52" r="2" fill="#fff"/>
<circle cx="62" cy="54" r="6" fill="#2b2340"/><circle cx="64" cy="52" r="2" fill="#fff"/>
<ellipse cx="50" cy="64" rx="4" ry="3" fill="#d0607a"/>

/* ---------- DIALOGUES ---------- */
const dlg = { file:[], fin:null, actif:false, choix:false };
function dire(lignes, fin){
  dlg.file = lignes.slice(); dlg.fin = fin || null; dlg.actif = true; dlg.choix = false;
  $("#dialogue").classList.add("visible"); $("#choix-zone").innerHTML = "";
  avancerDlg();
}
function avancerDlg(){
  if(dlg.choix) return;
  if(dlg.file.length === 0){
    $("#dialogue").classList.remove("visible"); dlg.actif = false;
    const fin = dlg.fin; dlg.fin = null;
    if(fin) fin();
    return;
  }
  const l = dlg.file.shift();
  $("#portrait").innerHTML = PORTRAITS[l.p] || PORTRAITS.recit;
  $("#nom-perso").textContent = NOMS[l.p] || "";
  $("#texte-dialogue").textContent = l.t;
  $("#suite").style.display = "block";
  son("pas");
}
function choisir(ligne, options){
  dlg.actif = true; dlg.choix = true; dlg.file = []; dlg.fin = null;
  $("#dialogue").classList.add("visible");
  $("#portrait").innerHTML = PORTRAITS[ligne.p] || PORTRAITS.recit;
  $("#nom-perso").textContent = NOMS[ligne.p] || "";
  $("#texte-dialogue").textContent = ligne.t;
  $("#suite").style.display = "none";
  const z = $("#choix-zone"); z.innerHTML = "";
  options.forEach(o=>{
    const b = document.createElement("button");
    b.className = "choix"; b.textContent = o.t;
    b.onclick = ()=>{ son("clic"); z.innerHTML=""; dlg.choix=false; dlg.actif=false;
      $("#dialogue").classList.remove("visible"); o.fn(); };
    z.appendChild(b);
  });
}

  const M = $("#modale"); M.classList.add("visible");

    const b = document.createElement("button");
    b.className = "choix"; b.textContent = o.t;
    b.onclick = ()=>{
      R.classList.add("visible");
      if(o.ok){
        son("bon"); R.classList.remove("mauvais"); R.classList.add("bon");
        R.innerHTML = "✅ " + o.r;
        Z.innerHTML = "";
        const c = document.createElement("button");
        c.className = "btn vert"; c.textContent = "Continuer ➜"; c.style.marginTop = "10px";
        c.onclick = ()=>{ M.classList.remove("visible"); onOk(); };
        Z.appendChild(c);

        son("mauvais"); R.classList.remove("bon"); R.classList.add("mauvais");

        b.style.opacity = ".45";
      }
    };

  });

    a.className = "choix"; a.style.background = "transparent"; a.style.boxShadow = "none";

    a.onclick = ()=>M.classList.remove("visible");

}

/* ---------- INDICES & DÉDUCTIONS ---------- */
function ajouterIndice(id){
  if(S.indices.includes(id)) return;
  S.indices.push(id); carnetAlerte = true; son("indice");
  toast(`✨ Indice trouvé : <b>${INDICES[id].nom}</b>`);
  sauver(); majUI();
}
function deductionsPretes(){
  return ORDRE_DED.filter(id=>{
    if(S.deductions[id]) return false;
    const d = DEDUCTIONS[id];
    if(!d.besoin.every(i=>S.indices.includes(i))) return false;
    if(d.besoinDed && !d.besoinDed.every(x=>S.deductions[x])) return false;
    return true;
  });
}
function lancerDeduction(id){
  const d = DEDUCTIONS[id];
  poserQuestion({ titre:`💡 ${d.titre}`, appui:d.besoin, question:d.question, options:d.options, annulable:true },
    ()=>{
      S.deductions[id] = true;
      if(d.apres) d.apres();
      carnetAlerte = true; sauver(); majUI();
      toast("📓 Déduction notée dans le carnet !");
      rerendre();
      setTimeout(()=>{ if(!verifierProgression()) majUI(); }, 350);
    });
}
$("#b-idee") && ($("#b-idee").onclick = ()=>{ son("clic"); const p = deductionsPretes()[0]; if(p) lancerDeduction(p); });

/* ---------- PROGRESSION DE L'HISTOIRE ---------- */
function verifierProgression(){
  if(S.deductions.d1 && S.deductions.d2 && !S.faits.versRuelle){
    S.faits.versRuelle = true; S.lieux.ruelle = "ouvert"; sauver();
    dire([
      {p:"mcflare", t:"Clever ! Plume le pigeon a vu quelque chose d'étrange cette nuit, dans la ruelle derrière le musée !"},
      {p:"clever", t:"Un témoin de plus ? Parfait. Notre petit voleur a bien dû redescendre du toit... Direction la ruelle !"}
    ], ()=>{ toast("🗺️ Nouveau lieu : la Ruelle !"); allerCarte(); });
    return true;
  }
  if(S.deductions.d3 && S.indices.includes("prospectus") && !S.faits.versBoutique){
    S.faits.versBoutique = true; S.lieux.boutique = "ouvert"; sauver();
    dire([
      {p:"clever", t:"Récapitulons : une poudre magique... une lueur qui file vers Camden... et un prospectus d'une boutique de magie, à Camden."},
      {p:"bro", t:"Tous les chemins mènent chez M. Furet !"}
    ], ()=>{ toast("🗺️ Nouveau lieu : la Boutique de Magie !"); allerCarte(); });
    return true;
  }
  if(S.deductions.d3 && !S.indices.includes("prospectus") && !S.faits.astucePoubelle){
    S.faits.astucePoubelle = true; sauver();
    dire([{p:"clever", t:"Le voleur a filé vers Camden... mais où, exactement ? Il nous manque une piste. Fouillons encore la ruelle !"}]);
    return true;
  }
  if(S.deductions.d5 && !S.faits.versTheatre){
    S.faits.versTheatre = true; S.lieux.theatre = "ouvert"; sauver();
    dire([
      {p:"mcflare", t:"D'après mes informateurs, Zigzag répète son numéro en ce moment même, au Vieux Théâtre."},
      {p:"clever", t:"Alors le rideau va tomber. En route pour le dernier acte !"}
    ], ()=>{ toast("🗺️ Nouveau lieu : le Vieux Théâtre !"); allerCarte(); });
    return true;
  }
  return false;
}

/* ---------- CARNET ---------- */
let ongletActif = "indices";
function ouvrirCarnet(){ carnetAlerte = false; majUI(); $("#carnet").classList.add("visible"); rendreCarnet(); }
function rendreCarnet(){
  document.querySelectorAll(".onglet").forEach(o=>o.classList.toggle("actif", o.dataset.tab===ongletActif));
  const C = $("#carnet-corps");
  if(ongletActif==="indices"){
    C.innerHTML = S.indices.length ? S.indices.map(id=>{
      const i = INDICES[id];
      return `<div class="carte-indice"><div class="ico">${i.ico}</div><div><h4>${i.nom}</h4><p>${i.desc}</p></div></div>`;
    }).join("") : `<div id="vide-carnet">Aucun indice pour l'instant.<br>Touche les endroits qui brillent pour enquêter ! 🔍</div>`;
  }
  if(ongletActif==="suspects"){
    if(!S.faits.brief){ C.innerHTML = `<div id="vide-carnet">Pas encore de suspects...</div>`; return; }
    C.innerHTML = Object.keys(SUSPECTS).map(id=>{
      const s = SUSPECTS[id], etat = S.suspects[id];
      const cls = etat==="non" ? "barre" : (etat==="coupable" ? "coupable" : "");
      const statut = etat==="non" ? `<div class="statut non">✔ Innocent·e — ${S.raisons[id]||""}</div>`
        : etat==="coupable" ? `<div class="statut" style="color:#d33">❗ C'est le Fantôme Vert !</div>`
        : `<div class="statut q">🔎 Suspect·e</div>`;
      return `<div class="carte-suspect ${cls}"><div class="tete">${PORTRAITS[id]}</div>
        <div><h4>${s.nom}</h4><p style="font-size:14px">${s.desc}</p>${statut}</div></div>`;
    }).join("");
  }
  if(ongletActif==="deductions"){
    const pretes = deductionsPretes();
    C.innerHTML = ORDRE_DED.map(id=>{
      const d = DEDUCTIONS[id];
      if(S.deductions[id]) return `<div class="carte-deduction faite"><h4>✅ ${d.titre}</h4><p>${d.resume}</p></div>`;
      if(pretes.includes(id)) return `<div class="carte-deduction"><h4>💡 ${d.titre}</h4><p>${d.question}</p>
        <button class="b-deduire" onclick="fermerCarnet();lancerDeduction('${id}')">Clever réfléchit !</button></div>`;
      return `<div class="carte-deduction"><h4>🔒 ${d.titre}</h4><p class="mini">Il manque encore des indices pour réfléchir à cette question...</p></div>`;
    }).join("");
  }
}
function fermerCarnet(){ $("#carnet").classList.remove("visible"); }

/* ---------- ÉCRANS ---------- */
function ecranTitre(){
  S.ecran = "titre"; majUI();
  const save = charger();
  const reprendre = save && save.faits && save.faits.brief && !save.fini;
  montrer(`<div class="scene-svg">${artTitre()}</div>
  <div class="voile-texte">
    <div class="sous-titre" style="margin-bottom:4px">MYSTERY LANE</div>
    <h1 class="titre-jeu">L'Affaire du<br>Fantôme Vert</h1>
    <p class="para-intro">Une enquête de Clever &amp; Bro, à Londres 🇬🇧</p>
    <div class="rangee-boutons">
      <button class="btn" onclick="nouvellePartie()">🔍 Nouvelle enquête</button>
      ${reprendre?`<button class="btn secondaire" onclick="reprendrePartie()">▶ Reprendre l'enquête</button>`:""}
    </div>
  </div>`);
}
function nouvellePartie(){
  const son_ = S.son; S = ETAT_NEUF(); S.son = son_; sauver();
  son("mystere"); jouerIntro(0);
}
function reprendrePartie(){
  const save = charger(); if(save){ S = Object.assign(ETAT_NEUF(), save); }
  son("clic"); majUI();
  if(!S.faits.brief){ jouerIntro(0); return; }
  if(S.lieu && S.lieu!=="theatre" && S.lieux[S.lieu]!=="verrou"){ allerLieu(S.lieu, true); }
  else allerCarte();
}
const INTRO = [
  { art:artIntro1, t:"Londres, la nuit. Au Musée des Merveilles dort le plus beau trésor des animaux : la Noisette d'Or, le trophée du Grand Concours des Talents." },
  { art:artIntro2, t:"Mais cette nuit... une lueur verte a flotté dans le musée ! Au matin, la vitrine était vide. Le gardien tremble encore : « J'ai vu un FANTÔME ! »" },
  { art:()=>artQG(true), t:"Un fantôme ? Scotland Yard n'y croit pas une seconde. Le détective McFlare file à Mystery Lane... chez la meilleure détective du monde." }
];
function jouerIntro(i){
  S.ecran = "intro"; majUI();
  if(i >= INTRO.length){ briefing(); return; }
  montrer(`<div class="scene-svg">${INTRO[i].art()}</div>
  <div class="voile-texte" style="margin-top:auto;padding-bottom:34px">
    <p class="para-intro" style="background:rgba(8,11,30,.72);border-radius:16px;padding:14px 18px">${INTRO[i].t}</p>
    <button class="btn" onclick="son('clic');jouerIntro(${i+1})">${i<INTRO.length-1?"Suite ➜":"Commencer l'enquête 🔍"}</button>
  </div>`);
}
function briefing(){
  S.ecran = "lieu"; S.lieu = null; majUI();
  montrer(`<div class="scene-svg">${artQG(true)}</div>`);
  dire([
    {p:"mcflare", t:"Clever ! La Noisette d'Or a disparu cette nuit. Porte fermée à clé, vitrine intacte... et un témoin qui parle d'un fantôme vert !"},
    {p:"bro", t:"Un f-f-fantôme ?! Chouette ! Euh... je veux dire : au secours."},
    {p:"clever", t:"Les fantômes n'existent pas, Bro. Mais les voleurs malins, si. McFlare : qui rêvait de gagner cette Noisette d'Or ?"},
    {p:"mcflare", t:"Les trois finalistes du Grand Concours : Rita la Pie, Hector le Hérisson et Zigzag la Gerbille."},
    {p:"clever", t:"Les voilà, nos suspects ! Je les note dans mon carnet. Direction le musée — et ouvre l'œil, Bro : les indices n'attendent pas."}
  ], ()=>{
    S.faits.brief = true; S.lieux.musee = "ouvert"; carnetAlerte = true; sauver();
    toast("📓 Trois suspects notés dans le carnet !");
    allerCarte();
    setTimeout(()=>toast("👆 Touche les endroits qui brillent pour enquêter !"), 3400);
  });
}
function allerCarte(){
  S.ecran = "carte"; S.lieu = null; sauver(); majUI();
  montrer(`<div class="scene-svg">${artCarte()}</div>`);
}
function allerLieu(id, silencieux){
  if(S.lieux[id]==="verrou") return;
  son("clic");
  if(id==="theatre"){ confrontation(); return; }
  S.ecran = "lieu"; S.lieu = id; majUI();
  const art = { musee:artMusee, ruelle:artRuelle, boutique:artBoutique }[id];
  montrer(`<div class="scene-svg">${art()}</div>`);
  const premiere = !S.faits["entree_"+id];
  S.faits["entree_"+id] = true; sauver();
  if(silencieux || !premiere) return;
  const entrees = {
    musee:[{p:"clever", t:"Le Musée des Merveilles... La scène du crime. Cherchons partout, Bro : touche les endroits qui brillent."},
           {p:"bro", t:"Les endroits qui brillent ! Compris, chef !"}],
    ruelle:[{p:"clever", t:"La ruelle derrière le musée. C'est par ici que notre « fantôme » a filé... Brrr. Ouvre l'œil."}],
    boutique:[{p:"bro", t:"Ouah... une boutique de MAGIE ! Je peux toucher ? Dis, je peux toucher ?"},
              {p:"clever", t:"Tu peux SURTOUT m'aider à interroger M. Furet."}]
  };
  if(entrees[id]) dire(entrees[id]);
}
function rerendre(){
  if(S.ecran==="carte"){ montrer(`<div class="scene-svg">${artCarte()}</div>`); }
  else if(S.ecran==="lieu" && S.lieu){
    const art = { musee:artMusee, ruelle:artRuelle, boutique:artBoutique }[S.lieu];
    if(art) montrer(`<div class="scene-svg">${art()}</div>`);
  }
  majUI();
}
function marque(id){ S.faits[id] = true; sauver(); rerendre(); }

/* ---------- INTERACTIONS ---------- */
function toucher(id){
  if(dlg.actif) return;
  son("clic");
  /* --- carte --- */
  if(id==="maison"){
    dire([{p:"bro", t:"On rentre déjà ? J'ai laissé du fromage au QG..."},
          {p:"clever", t:"Le fromage attendra, Bro. Une enquête nous attend !"}]);
    return;
  }
  /* --- musée --- */
  if(id==="barnaby"){
    dire([
      {p:"barnaby", t:"B-b-bienvenue, détective... Je suis Barnaby, le gardien. Cette nuit, une chose verte et brillante flottait là, au-dessus de la vitrine !"},
      {p:"bro", t:"Elle a dit « bouh » ?"},
      {p:"barnaby", t:"Elle n'a rien dit ! Elle brillait dans le noir... Et je le jure : la porte est restée fermée à clé toute la nuit !"},
      {p:"clever", t:"Intéressant... Un visiteur qui brille et qui n'utilise pas les portes. Je note tout ça."}
    ], ()=>{ ajouterIndice("t_barnaby"); marque("h_barnaby"); });
    return;
  }
  if(id==="vitrine"){
    dire([
      {p:"clever", t:"La vitrine de la Noisette d'Or... La vitre n'est pas cassée. Et regarde : la petite serrure porte de fines rayures."},
      {p:"clever", t:"Quelqu'un l'a ouverte avec un outil très, très fin. Ce n'est pas le travail d'un fantôme, ça."}
    ], ()=>{ ajouterIndice("serrure"); marque("h_vitrine"); });
    return;
  }
  if(id==="poudre"){
    dire([
      {p:"clever", t:"De la poudre verte, par terre ! J'en mets un peu dans mon flacon... Regarde, Bro : quand je la cache dans l'ombre... elle BRILLE."},
      {p:"bro", t:"Ouah ! De la poussière de fantôme !"},
      {p:"clever", t:"Hmm. Ou quelque chose de beaucoup moins magique..."}
    ], ()=>{ ajouterIndice("poudre"); marque("h_poudre"); });
    return;
  }
  if(id==="grille"){
    if(S.faits.h_grille){
      dire([{p:"clever", t:"La grille minuscule où Bro a trouvé la graine grignotée. Tout est dans le carnet."}]);
      return;
    }
    dire([
      {p:"clever", t:"Cette grille d'aération, tout là-haut... Elle est entrouverte ! Mais c'est bien trop haut pour moi. Bro ?"},
      {p:"bro", t:"Mission acceptée ! Personne ne grimpe mieux que moi. Comment j'y monte, chef ?"}
    ], ()=>{
      choisir({p:"clever", t:"À toi de choisir, Bro..."}, [
        { t:"🪢 Par le grand rideau, comme un pirate !", fn:()=>missionGrille([{p:"bro", t:"À L'ABORDAGE !"},{p:"recit", t:"Bro escalade le rideau à toute vitesse, saute... et s'accroche à la grille !"}]) },
        { t:"🪜 Sur la grande échelle de Barnaby !", fn:()=>missionGrille([{p:"recit", t:"Barnaby tient l'échelle en tremblant. Bro grimpe les barreaux quatre à quatre !"}]) },
        { t:"🏛️ En escaladant la colonne !", fn:()=>missionGrille([{p:"bro", t:"Facile ! Les colonnes, c'est mon sport préféré."},{p:"recit", t:"Hop, hop, hop... Bro atteint la grille !"}]) }
      ]);
    });
    return;
  }
  /* --- ruelle --- */
  if(id==="plume"){
    dire([
      {p:"plume", t:"Rrrou ! Je l'ai vue, la lueur verte ! Et je vais vous dire un secret : elle ne volait PAS."},
      {p:"plume", t:"Elle descendait le long du mur, tout doucement, comme quelqu'un qui grimpe. Puis elle a filé... vers Camden !"},
      {p:"bro", t:"Un fantôme qui a le vertige ? C'est louche."}
    ], ()=>{ ajouterIndice("t_plume"); marque("h_plume"); });
    return;
  }
  if(id==="gouttiere"){
    dire([
      {p:"clever", t:"Des traces de poudre verte, tout le long de la gouttière... du toit jusqu'au sol."},
      {p:"clever", t:"Notre « fantôme » est passé par ici. Et il a laissé sa signature brillante."}
    ], ()=>{ ajouterIndice("gouttiere"); marque("h_gouttiere"); });
    return;
  }
  if(id==="poubelle"){
    dire([
      {p:"bro", t:"Une poubelle ! J'adore les poubelles. Laisse-moi faire... Alors : un vieux sandwich... un chapeau troué... et... UN PAPIER !"},
      {p:"clever", t:"« Boutique de Magie de M. Furet — Camden ». Camden... exactement la direction prise par la lueur verte !"}
    ], ()=>{ ajouterIndice("prospectus"); marque("h_poubelle"); setTimeout(verifierProgression, 400); });
    return;
  }
  /* --- boutique --- */
  if(id==="furet"){
    dire([
      {p:"furet", t:"Bienvenue chez Furet le Magnifique ! Poudres, potions, tours de passe-passe..."},
      {p:"clever", t:"Bonjour, M. Furet. Reconnaissez-vous cette poudre verte ?"},
      {p:"furet", t:"Ma Poudre de Lune ! Elle brille dans le noir. J'en ai vendu un pot mardi, à un petit client qui portait une cape d'apprenti magicien."},
      {p:"bro", t:"Et il a payé avec quoi ? Des pièces d'or ?"},
      {p:"furet", t:"Non... avec un sac de graines de tournesol ! Et il a aussi acheté mon épingle passe-partout, fine comme un cheveu. « Pour les serrures », disait-il."},
      {p:"clever", t:"Poudre, graines, épingle... M. Furet, vous venez de résoudre la moitié de mon enquête."}
    ], ()=>{ ajouterIndice("poudrelune"); ajouterIndice("graines2"); ajouterIndice("epingle"); marque("h_furet"); });
    return;
  }
  if(id==="affiche"){
    dire([
      {p:"clever", t:"L'affiche du Grand Concours des Talents ! Rita chante... Hector jongle... et Zigzag ?"},
      {p:"clever", t:"« Le tour du Fantôme de Zigzag a raté : tout le public a ri. » Et regarde sa cape d'apprentie magicienne..."},
      {p:"bro", t:"Oh oh."}
    ], ()=>{ ajouterIndice("affiche"); marque("h_affiche"); });
    return;
  }
}
function missionGrille(gag){
  dire(gag.concat([
    {p:"bro", t:"C'est TOUT PETIT ici ! Même moi, j'y passe à peine... Hé ! Une graine de tournesol à moitié croquée, coincée dans la grille !"},
    {p:"clever", t:"Excellente trouvaille, Bro. Notre voleur grignote en travaillant..."}
  ]), ()=>{ ajouterIndice("grille"); ajouterIndice("graine"); marque("h_grille"); });
}

/* ---------- LA CONFRONTATION AU THÉÂTRE ---------- */
function confrontation(){
  S.ecran = "lieu"; S.lieu = "theatre"; majUI();
  montrer(`<div class="scene-svg">${artTheatre()}</div>`);
  dire([
    {p:"zigzag", t:"« Et pour mon prochain tour, mesdames et messieurs... » ... C-C-Clever ?! Qu'est-ce que vous faites ici ?"},
    {p:"clever", t:"Nous venons applaudir... le Fantôme Vert."},
    {p:"zigzag", t:"Le... le quoi ? Je ne vois pas du tout de quoi vous parlez !"},
    {p:"clever", t:"Vraiment ? Alors vérifions si ma logique est imparable. Aide-moi, détective : à chaque phrase, choisis la bonne preuve dans notre carnet !"}
  ], ()=>preuve(0));
}
function preuve(i){
  if(i >= PREUVES.length){ fuite(); return; }
  poserQuestion({ titre:`🔎 Preuve n°${i+1} sur ${PREUVES.length}`, question:PREUVES[i].question, options:PREUVES[i].options },
    ()=>preuve(i+1));
}
function fuite(){
  dire([
    {p:"zigzag", t:"Non ! Enfin... je... VOUS NE M'ATTRAPEREZ JAMAIS !"},
    {p:"recit", t:"Zigzag bondit de la table de magie et file droit vers la trappe du théâtre !"}
  ], ()=>{
    choisir({p:"clever", t:"Vite, Bro ! Zigzag file vers la trappe ! Que fais-tu ?"}, [
      { t:"🪢 Tire le grand rideau rouge !", fn:()=>dire([
          {p:"bro", t:"HIIII-YAAA !"},
          {p:"recit", t:"Le rideau tombe... sur McFlare. « BROOOO ! » Pendant ce temps, Zigzag court toujours !"}
        ], fuite2) },
      { t:"🌾 Pousse le sac de farine au-dessus de la trappe !", fn:reussiteBro },
      { t:"🦅 Crie « REGARDE, UN AIGLE ! »", fn:()=>dire([
          {p:"bro", t:"REGARDE, UN AIGLE !!!"},
          {p:"recit", t:"Zigzag ne se retourne même pas. Évidemment : les magiciens connaissent toutes les diversions..."}
        ], fuite2) }
    ]);
  });
}
function fuite2(){
  choisir({p:"clever", t:"Elle y est presque, Bro ! Réfléchis : qu'y a-t-il juste AU-DESSUS de la trappe ?"}, [
    { t:"🌾 Le sac de farine ! Pousse-le !", fn:reussiteBro },
    { t:"🪢 Le rideau ! Encore !", fn:()=>dire([
        {p:"mcflare", t:"(de sous le rideau) N'y pense même pas, Bro."}
      ], fuite2) }
  ]);
}
function reussiteBro(){
  son("bon");
  dire([
    {p:"bro", t:"Le sac de farine ! GERONIMOOOO !"},
    {p:"recit", t:"POUF ! Un énorme nuage blanc ! Zigzag glisse, tourbillonne... et atterrit tout en douceur dans les bras de McFlare."},
    {p:"mcflare", t:"Zigzag la Gerbille... vous êtes faite comme un rat. Enfin. Comme une gerbille."},
    {p:"zigzag", t:"D'accord, d'accord... c'était moi. Mais laissez-moi vous expliquer !"},
    {p:"zigzag", t:"Au Concours, mon tour du Fantôme a raté... et tout le monde a ri de moi. TOUT LE MONDE."},
    {p:"zigzag", t:"Alors j'ai voulu prouver que j'étais une VRAIE magicienne : faire disparaître le trésor le mieux gardé de Londres ! J'allais le rendre, promis..."},
    {p:"clever", t:"Faire disparaître, c'est facile, Zigzag. Le vrai talent, c'est de faire APPARAÎTRE. Et si tu rendais la Noisette d'Or... en spectacle ?"},
    {p:"zigzag", t:"En... en spectacle ? Vous feriez ça pour moi ?"},
    {p:"recit", t:"Le lendemain, au musée : « Mesdames et messieurs... ABRACADABRA ! » La Noisette d'Or réapparaît dans sa vitrine, sous un tonnerre d'applaudissements."},
    {p:"mcflare", t:"Affaire classée. Chapeau, Clever !"},
    {p:"bro", t:"Et chapeau POINTU pour Zigzag !"}
  ], finirPartie);
}
function finirPartie(){
  S.fini = true; S.lieu = null; sauver();
  son("tada");
  S.ecran = "fin"; majUI();
  const recap = ORDRE_DED.map(id=>`<div style="text-align:left;font-size:14px;background:rgba(8,11,30,.6);border-radius:10px;padding:8px 12px;margin:5px 0">✅ ${DEDUCTIONS[id].resume}</div>`).join("");
  montrer(`<div class="scene-svg">${artFin()}</div>
  <div class="voile-texte" style="overflow-y:auto;max-height:100%">
    <h1 class="titre-jeu" style="font-size:clamp(24px,5vmin,40px)">🏅 Affaire résolue !</h1>
    <p class="para-intro">Tu as gagné le badge de <b>Détective d'Or</b> !<br>🐾 Indices trouvés : ${S.indices.length}/${NB_INDICES}</p>
    <details style="max-width:640px;margin:0 auto"><summary style="cursor:pointer;font-family:var(--f-titre);color:var(--vert)">📓 Revoir la logique imparable de Clever</summary>${recap}</details>
    <div class="rangee-boutons">
      <button class="btn" onclick="nouvellePartie()">🔄 Rejouer l'enquête</button>
      <button class="btn secondaire" onclick="ecranTitre()">🏠 Écran titre</button>
    </div>
  </div>`);
}

/* ---------- DÉMARRAGE ---------- */
function init(){
  $("#bulle").onclick = ()=>{ if(!dlg.choix){ son("clic"); avancerDlg(); } };
  $("#b-carnet").onclick = ()=>{ son("clic"); ouvrirCarnet(); };
  $("#b-carte-retour").onclick = ()=>{ if(!dlg.actif){ son("clic"); allerCarte(); } };
  $("#b-son").onclick = ()=>{ S.son = !S.son; sauver(); majBarre(); son("clic"); };
  document.querySelectorAll(".onglet").forEach(o=>{
    o.onclick = ()=>{ son("clic");
      if(o.dataset.tab==="fermer"){ fermerCarnet(); return; }
      ongletActif = o.dataset.tab; rendreCarnet(); };
  });
  const save = charger();
  if(save && typeof save.son === "boolean") S.son = save.son;
  ecranTitre();
}
window.addEventListener("load", init);
</script>
</body>
</html>
